<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolarCRM — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--teal:#1D9E75;--teal-dark:#0F6E56;--teal-light:#E1F5EE;--bg:#F7F6F2;--card:#FFFFFF;--text:#1A1A18;--text-muted:#6B6B67;--border:rgba(0,0,0,0.1);--error:#E24B4A;--error-light:#FCEBEB;}
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;position:relative;overflow:hidden;}
    body::before{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(29,158,117,0.12) 0%,transparent 70%);pointer-events:none;}
    body::after{content:'';position:fixed;bottom:-200px;left:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(29,158,117,0.08) 0%,transparent 70%);pointer-events:none;}
    .card{background:var(--card);border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 4px 40px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);animation:fadeUp 0.5s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
    .logo-icon{width:36px;height:36px;background:var(--teal-light);border-radius:10px;display:flex;align-items:center;justify-content:center;}
    .logo-icon i{font-size:20px;color:var(--teal);}
    .logo-text{font-size:18px;font-weight:600;}
    .logo-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
    h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;margin-bottom:6px;line-height:1.2;}
    .subtitle{font-size:13px;color:var(--text-muted);margin-bottom:28px;}
    .form-group{margin-bottom:16px;}
    label{display:block;font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:6px;}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-muted);pointer-events:none;}
    input{width:100%;padding:11px 12px 11px 38px;font-size:14px;font-family:'DM Sans',sans-serif;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);transition:border-color 0.2s,box-shadow 0.2s;outline:none;}
    input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(29,158,117,0.12);background:#fff;}
    input.error{border-color:var(--error);}
    .toggle-pass{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:0;}
    .toggle-pass:hover{color:var(--text);}
    .error-msg{display:none;background:var(--error-light);color:var(--error);font-size:12px;padding:10px 12px;border-radius:8px;margin-bottom:16px;align-items:center;gap:7px;}
    .error-msg.show{display:flex;}
    .btn-login{width:100%;padding:12px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.2s,transform 0.1s;margin-top:8px;}
    .btn-login:hover{background:var(--teal-dark);}
    .btn-login:active{transform:scale(0.98);}
    .btn-login:disabled{background:#9FE1CB;cursor:not-allowed;transform:none;}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
    .btn-login.loading .spinner{display:block;}
    .btn-login.loading .btn-text{display:none;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .footer{text-align:center;margin-top:24px;font-size:11px;color:var(--text-muted);}
    .footer a{color:var(--teal);text-decoration:none;}
    .success-state{display:none;text-align:center;padding:20px 0;}
    .success-state.show{display:block;}
    .success-icon{width:56px;height:56px;background:var(--teal-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
    .success-icon i{font-size:28px;color:var(--teal);}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-solar-panel"></i></div>
      <div>
        <div class="logo-text">SolarCRM</div>
        <div class="logo-sub">Monitoramento Solar</div>
      </div>
    </div>
    <div id="form-section">
      <h1>Bem-vindo de volta</h1>
      <p class="subtitle">Entre com suas credenciais para acessar o painel.</p>
      <div class="error-msg" id="error-msg">
        <i class="ti ti-alert-circle"></i>
        <span id="error-text">E-mail ou senha incorretos.</span>
      </div>
      <div class="form-group">
        <label for="email">E-mail</label>
        <div class="input-wrap">
          <i class="ti ti-mail"></i>
          <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <i class="ti ti-lock"></i>
          <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
          <button class="toggle-pass" id="toggle-pass" type="button" aria-label="Mostrar senha">
            <i class="ti ti-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>
      <button class="btn-login" id="btn-login" type="button">
        <div class="spinner"></div>
        <span class="btn-text"><i class="ti ti-login"></i> Entrar no painel</span>
      </button>
    </div>
    <div class="success-state" id="success-state">
      <div class="success-icon"><i class="ti ti-check"></i></div>
      <div style="font-size:16px;font-weight:600;margin-bottom:6px;">Login realizado!</div>
      <div style="font-size:13px;color:var(--text-muted);">Redirecionando para o painel...</div>
    </div>
    <div class="footer">
      SolarCRM &copy; 2026 · <a href="mailto:suporte@seudominio.com.br">Suporte</a>
    </div>
  </div>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
    const supabase = createClient(
      'https://ovqwavrbxdplehvgplcv.supabase.co',
      'SUA_CHAVE_ANON_PUBLIC'
    )
    const btnLogin = document.getElementById('btn-login')
    const emailInput = document.getElementById('email')
    const senhaInput = document.getElementById('senha')
    const errorMsg = document.getElementById('error-msg')
    const errorText = document.getElementById('error-text')
    const togglePass = document.getElementById('toggle-pass')
    const eyeIcon = document.getElementById('eye-icon')

    const { data: { session } } = await supabase.auth.getSession()
    if (session) window.location.href = '/index.html'

    togglePass.addEventListener('click', () => {
      if (senhaInput.type === 'password') {
        senhaInput.type = 'text'
        eyeIcon.className = 'ti ti-eye-off'
      } else {
        senhaInput.type = 'password'
        eyeIcon.className = 'ti ti-eye'
      }
    })

    senhaInput.addEventListener('keydown', e => { if (e.key === 'Enter') btnLogin.click() })
    emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') senhaInput.focus() })

    btnLogin.addEventListener('click', async () => {
      const email = emailInput.value.trim()
      const senha = senhaInput.value
      if (!email || !senha) { mostrarErro('Preencha o e-mail e a senha.'); return }
      btnLogin.classList.add('loading')
      btnLogin.disabled = true
      errorMsg.classList.remove('show')
      const { error } = await supabase.auth.signInWithPassword({ email, password: senha })
      if (error) {
        btnLogin.classList.remove('loading')
        btnLogin.disabled = false
        mostrarErro(
          error.message.includes('Invalid') ? 'E-mail ou senha incorretos.' :
          error.message.includes('Email not confirmed') ? 'Confirme seu e-mail antes de entrar.' :
          'Erro ao fazer login. Tente novamente.'
        )
        emailInput.classList.add('error')
        senhaInput.classList.add('error')
      } else {
        document.getElementById('form-section').style.display = 'none'
        document.getElementById('success-state').classList.add('show')
        setTimeout(() => { window.location.href = '/index.html' }, 1500)
      }
    })

    function mostrarErro(msg) { errorText.textContent = msg; errorMsg.classList.add('show') }
    emailInput.addEventListener('input', () => { errorMsg.classList.remove('show'); emailInput.classList.remove('error'); senhaInput.classList.remove('error') })
    senhaInput.addEventListener('input', () => { errorMsg.classList.remove('show'); emailInput.classList.remove('error'); senhaInput.classList.remove('error') })
  </script>
</body>
</html>
