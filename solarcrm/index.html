<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolarCRM — Monitoramento Solar</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <div class="logo-icon"><i class="ti ti-solar-panel"></i></div>
        <div>
          <div class="logo-text">SolarCRM</div>
          <div class="logo-sub">v2.0 — Pro</div>
        </div>
      </div>

      <nav class="nav">
        <div class="nav-section">
          <div class="nav-label">Visão geral</div>
          <a class="nav-item active" data-page="dashboard"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
          <a class="nav-item" data-page="clientes"><i class="ti ti-users"></i> Clientes</a>
          <a class="nav-item" data-page="inversores"><i class="ti ti-cpu"></i> Inversores</a>
        </div>
        <div class="nav-section">
          <div class="nav-label">Comunicação</div>
          <a class="nav-item" data-page="relatorios"><i class="ti ti-file-description"></i> Relatórios</a>
          <a class="nav-item" data-page="alertas"><i class="ti ti-bell"></i> Alertas <span class="badge b-err" id="badge-alertas">4</span></a>
        </div>
        <div class="nav-section">
          <div class="nav-label">Sistema</div>
          <a class="nav-item" data-page="config"><i class="ti ti-settings"></i> Configurações</a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="avatar-sm">GS</div>
          <div>
            <div class="user-name">Gestor Solar</div>
            <div class="user-role">Administrador</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="btn-icon menu-toggle" id="menu-toggle" aria-label="Menu"><i class="ti ti-menu-2"></i></button>
          <span class="page-title" id="ptitle">Dashboard</span>
          <span class="breadcrumb" id="pbread"></span>
        </div>
        <div class="topbar-right">
          <button class="btn" id="btn-novo-cliente"><i class="ti ti-plus"></i> Novo cliente</button>
          <button class="btn btn-teal" id="btn-enviar-relatorios"><i class="ti ti-send"></i> Enviar relatórios</button>
        </div>
      </header>

      <main class="content">
      </main>
    </div>
  </div>

  <!-- MODAL NOVO CLIENTE -->
  <div class="modal-overlay" id="modal-cliente" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Novo cliente</h2>
        <button class="btn-icon" id="modal-close" aria-label="Fechar"><i class="ti ti-x"></i></button>
      </div>
      <form id="form-cliente" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="f-nome">Nome completo</label>
            <input type="text" id="f-nome" placeholder="Ex: João Silva" required />
          </div>
          <div class="form-group">
            <label for="f-tipo">Tipo</label>
            <select id="f-tipo">
              <option value="Residencial">Residencial</option>
              <option value="Comercial">Comercial</option>
              <option value="Industrial">Industrial</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-potencia">Potência instalada (kWp)</label>
            <input type="number" id="f-potencia" placeholder="Ex: 5.4" step="0.1" min="0.5" required />
          </div>
          <div class="form-group">
            <label for="f-paineis">Nº de painéis</label>
            <input type="number" id="f-paineis" placeholder="Ex: 12" min="1" required />
          </div>
        </div>
        <div class="form-group">
          <label for="f-email">E-mail</label>
          <input type="email" id="f-email" placeholder="cliente@email.com" required />
        </div>
        <div class="form-group">
          <label for="f-whats">WhatsApp</label>
          <input type="tel" id="f-whats" placeholder="(83) 99999-9999" />
        </div>
        <div class="form-group">
          <label for="f-endereco">Endereço de instalação</label>
          <input type="text" id="f-endereco" placeholder="Rua, número, cidade, estado" />
        </div>
        <div class="form-group">
          <label for="f-inversor">Modelo do inversor</label>
          <select id="f-inversor">
            <option>Growatt MIN 3000TL</option>
            <option>Growatt MIN 5000TL</option>
            <option>Fronius Symo 8.0</option>
            <option>Fronius Symo 24.0</option>
            <option>SolarEdge SE6K</option>
            <option>SolarEdge SE8K</option>
            <option>Huawei SUN2000-5KTL</option>
            <option>ABB UNO-DM-3.0</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn" id="btn-cancel-modal">Cancelar</button>
          <button type="submit" class="btn btn-teal">Salvar cliente</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL RELATÓRIO -->
  <div class="modal-overlay" id="modal-relatorio" role="dialog" aria-modal="true" aria-labelledby="modal-rel-title">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2 id="modal-rel-title">Pré-visualização do relatório</h2>
        <button class="btn-icon" id="modal-rel-close" aria-label="Fechar"><i class="ti ti-x"></i></button>
      </div>
      <div id="preview-relatorio"></div>
      <div class="form-actions" style="margin-top:16px;">
        <button class="btn" id="btn-cancel-rel">Fechar</button>
        <button class="btn btn-teal" id="btn-enviar-preview"><i class="ti ti-send"></i> Confirmar envio</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/pages.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
